<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mooz AI - Mock Products Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-2: #f5f5f4;
      --bg-3: #e7e5e4;
      --text: #1c1917;
      --text-2: #78716c;
      --text-3: #a8a29e;
      --border: rgba(0,0,0,0.08);
      --border-2: rgba(0,0,0,0.14);
      --radius: 8px;
      --radius-lg: 12px;
      --success-bg: #f0fdf4; --success: #16a34a;
      --warn-bg: #fffbeb;    --warn: #d97706;
      --danger-bg: #fef2f2;  --danger: #dc2626;
      --accent: #1c1917;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      font-size: 14px;
      padding-bottom: 60px;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon {
      width: 30px; height: 30px;
      background: var(--text);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 13px; font-weight: 600;
    }
    .brand-name { font-size: 14px; font-weight: 600; }
    .brand-sub  { font-size: 11px; color: var(--text-2); }

    .badges { display: flex; gap: 6px; }
    .badge {
      font-size: 11px; font-weight: 500;
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid var(--border-2);
      color: var(--text-2);
      display: flex; align-items: center; gap: 5px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }

    /* ── Main ── */
    main { max-width: 1200px; margin: 0 auto; padding: 32px 40px 0; }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }
    .stat {
      background: var(--bg-2);
      border-radius: var(--radius);
      padding: 16px;
    }
    .stat-label {
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-2); margin-bottom: 6px;
    }
    .stat-val { font-size: 22px; font-weight: 600; }
    .stat-val.warn { color: var(--warn); }

    /* ── Controls ── */
    .controls {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--text-3); pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 8px 10px 8px 34px;
      font-size: 13px; font-family: inherit;
      border: 1px solid var(--border-2);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--text-2); }
    .search-input::placeholder { color: var(--text-3); }

    .pills { display: flex; gap: 6px; overflow-x: auto; flex-wrap: nowrap; }
    .pill {
      font-size: 12px; font-weight: 500;
      padding: 6px 12px; border-radius: 20px;
      border: 1px solid var(--border-2);
      background: none; color: var(--text-2);
      cursor: pointer; white-space: nowrap;
      transition: all 0.15s;
      font-family: inherit;
    }
    .pill:hover { color: var(--text); border-color: var(--border-2); }
    .pill.active {
      background: var(--text);
      border-color: var(--text);
      color: #fff;
    }

    /* ── Table ── */
    .tbl-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    table {
      width: 100%; border-collapse: collapse;
      font-size: 13px; table-layout: fixed;
    }
    th {
      padding: 10px 14px;
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-2); text-align: left;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr { cursor: pointer; transition: background 0.1s; }
    tr:hover td { background: var(--bg-2); }
    tr.sel td { background: #f0f0f0; }

    .mono { font-family: 'Fira Code', monospace; font-size: 11px; color: var(--text-2); }
    .cat-badge {
      font-size: 11px; padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border-2);
      color: var(--text-2);
    }
    .stk {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 500;
      padding: 3px 8px; border-radius: 4px;
    }
    .stk.ok  { background: var(--success-bg); color: var(--success); }
    .stk.lo  { background: var(--warn-bg);    color: var(--warn); }
    .stk.cr  { background: var(--danger-bg);  color: var(--danger); }
    .stk-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .price { text-align: right; font-variant-numeric: tabular-nums; }

    /* ── Pagination ── */
    .pag {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 14px; flex-wrap: wrap; gap: 8px;
    }
    .pag-info { font-size: 12px; color: var(--text-2); }
    .pag-left { display: flex; align-items: center; gap: 12px; }
    .pag-select {
      font-size: 12px; padding: 4px 6px;
      border: 1px solid var(--border-2);
      border-radius: 6px; background: var(--bg);
      color: var(--text); font-family: inherit;
      cursor: pointer; outline: none;
    }
    .pag-btns { display: flex; gap: 6px; }
    .pag-btn {
      font-size: 12px; font-weight: 500; font-family: inherit;
      padding: 6px 12px;
      border: 1px solid var(--border-2);
      border-radius: var(--radius);
      background: var(--bg); color: var(--text);
      cursor: pointer; transition: all 0.1s;
    }
    .pag-btn:hover:not(:disabled) { background: var(--bg-2); }
    .pag-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Inspector ── */
    .inspector {
      margin-top: 24px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
      display: none;
    }
    .ins-head {
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-2); margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    pre {
      font-family: 'Fira Code', monospace; font-size: 12px; line-height: 1.6;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px; overflow-x: auto;
      color: var(--text);
    }

    .empty {
      text-align: center; color: var(--text-2);
      font-size: 13px; padding: 3rem 0;
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-icon">M</div>
      <div>
        <div class="brand-name">Mooz AI Catalog</div>
        <div class="brand-sub">Mock products for development</div>
      </div>
    </div>
    <div class="badges">
      <span class="badge"><span class="dot"></span>Local Express</span>
      <span class="badge"><span class="dot"></span>GitHub Pages</span>
    </div>
  </header>

  <main>
    <div class="stats">
      <div class="stat"><div class="stat-label">Total items</div><div class="stat-val" id="s-total">—</div></div>
      <div class="stat"><div class="stat-label">Stock value HT</div><div class="stat-val" id="s-value">—</div></div>
      <div class="stat"><div class="stat-label">Categories</div><div class="stat-val" id="s-cats">—</div></div>
      <div class="stat"><div class="stat-label">Low stock</div><div class="stat-val warn" id="s-alerts">—</div></div>
    </div>

    <div class="controls">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="q" class="search-input" placeholder="Search by designation, EAN, article…">
      </div>
      <div class="pills" id="pills">
        <button class="pill active" data-r="all">All</button>
      </div>
    </div>

    <div class="tbl-wrap">
      <table>
        <colgroup>
          <col style="width:130px">
          <col style="width:80px">
          <col style="width:90px">
          <col>
          <col style="width:80px">
          <col style="width:115px">
          <col style="width:90px">
        </colgroup>
        <thead>
          <tr>
            <th>EAN</th>
            <th>Article</th>
            <th>Category</th>
            <th>Designation</th>
            <th>Stock</th>
            <th>Status</th>
            <th style="text-align:right">Price HT</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="pag">
      <div class="pag-left">
        <span class="pag-info" id="pag-info">—</span>
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2)">
          Show
          <select id="sz" class="pag-select">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="30">30</option>
          </select>
        </div>
      </div>
      <div class="pag-btns">
        <button class="pag-btn" id="prev">← Prev</button>
        <button class="pag-btn" id="next">Next →</button>
      </div>
    </div>

    <div class="inspector" id="inspector">
      <div class="ins-head">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        JSON payload
      </div>
      <pre id="json-out"></pre>
    </div>
  </main>

  <script>
    const FALLBACK = [
      { ean: "3250390151234", article: "100432", category: "Grocery",  designation: "Wheat Flour T55 Francine 1kg",       availableStock: 150, stockDays: 12, priceHT: 1.15 },
      { ean: "3155250000087", article: "200543", category: "Dairy",    designation: "Semi-Skimmed Milk GrandLait 1L",     availableStock: 320, stockDays: 8,  priceHT: 0.95 },
      { ean: "3222471018241", article: "200912", category: "Dairy",    designation: "Unsalted Butter President 250g",     availableStock: 85,  stockDays: 4,  priceHT: 2.10 },
      { ean: "3265478010294", article: "300122", category: "Meat",     designation: "Free-range Chicken Fillet 500g",    availableStock: 42,  stockDays: 2,  priceHT: 6.80 },
      { ean: "3017620422003", article: "100871", category: "Grocery",  designation: "Nutella Chocolate Spread 400g",     availableStock: 110, stockDays: 15, priceHT: 2.85 },
      { ean: "3168478100293", article: "250109", category: "Produce",  designation: "Golden Apples France Bag 1.5kg",    availableStock: 60,  stockDays: 3,  priceHT: 2.29 },
      { ean: "3250390001092", article: "100914", category: "Grocery",  designation: "Panzani Elbow Pasta 1kg",           availableStock: 450, stockDays: 25, priceHT: 1.49 },
      { ean: "3012345678901", article: "310045", category: "Beverage", designation: "Evian Natural Spring Water 1.5L",   availableStock: 200, stockDays: 10, priceHT: 0.79 },
      { ean: "3098765432100", article: "410023", category: "Produce",  designation: "Organic Carrots 1kg",               availableStock: 30,  stockDays: 1,  priceHT: 1.89 },
      { ean: "3076543219876", article: "500312", category: "Bakery",   designation: "Sourdough Bread Pain Poilâne 400g", availableStock: 18,  stockDays: 2,  priceHT: 4.20 },
      { ean: "3045678912345", article: "600011", category: "Bakery",   designation: "Croissant au Beurre x6",            availableStock: 75,  stockDays: 6,  priceHT: 3.49 },
      { ean: "3098123456789", article: "700099", category: "Meat",     designation: "Ground Beef 15% Fat 500g",          availableStock: 55,  stockDays: 3,  priceHT: 5.60 }
    ];

    let all = [], sel = 'all', page = 1, perPage = 10, selEan = null;

    const stkClass = d => d <= 2 ? 'cr' : d <= 5 ? 'lo' : 'ok';
    const stkLabel = d => d <= 2 ? 'Critical' : d <= 5 ? 'Low' : 'Healthy';

    function stats() {
      document.getElementById('s-total').textContent = all.length;
      const v = all.reduce((a, p) => a + p.availableStock * p.priceHT, 0);
      document.getElementById('s-value').textContent = v.toLocaleString('fr-FR', { maximumFractionDigits: 2 }) + ' €';
      document.getElementById('s-cats').textContent = new Set(all.map(p => p.category)).size;
      document.getElementById('s-alerts').textContent = all.filter(p => p.stockDays <= 3).length;
    }

    function pills() {
      const c = document.getElementById('pills');
      [...new Set(all.map(p => p.category))].sort().forEach(r => {
        const b = document.createElement('button');
        b.className = 'pill'; b.dataset.r = r; b.textContent = r;
        b.onclick = () => pick(r, b);
        c.appendChild(b);
      });
      document.querySelector('[data-r="all"]').onclick = e => pick('all', e.currentTarget);
    }

    function pick(r, el) {
      sel = r; page = 1;
      document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    function filtered() {
      const q = document.getElementById('q').value.toLowerCase().trim();
      return all.filter(p => {
        const rm = sel === 'all' || p.category === sel;
        const sm = !q || p.designation.toLowerCase().includes(q) || p.ean.includes(q) || p.article.toLowerCase().includes(q);
        return rm && sm;
      });
    }

    function render() {
      const f = filtered();
      const total = f.length;
      const pages = Math.ceil(total / perPage) || 1;
      if (page > pages) page = pages;
      const start = (page - 1) * perPage, end = start + perPage;
      const items = f.slice(start, end);
      const tbody = document.getElementById('tbody');

      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty">No products match.</div></td></tr>`;
        document.getElementById('pag-info').textContent = 'No results';
        return;
      }

      tbody.innerHTML = items.map(p => `
        <tr data-ean="${p.ean}" class="${p.ean === selEan ? 'sel' : ''}">
          <td class="mono">${p.ean}</td>
          <td class="mono">${p.article}</td>
          <td><span class="cat-badge">${p.category}</span></td>
          <td title="${p.designation}">${p.designation}</td>
          <td>${p.availableStock}</td>
          <td><span class="stk ${stkClass(p.stockDays)}"><span class="stk-dot"></span>${stkLabel(p.stockDays)} (${p.stockDays}d)</span></td>
          <td class="price">${p.priceHT.toFixed(2)} €</td>
        </tr>`).join('');

      document.getElementById('pag-info').textContent = `${start + 1}–${Math.min(end, total)} of ${total}`;
      document.getElementById('prev').disabled = page === 1;
      document.getElementById('next').disabled = page === pages;

      tbody.querySelectorAll('tr').forEach(row => {
        row.addEventListener('click', () => {
          selEan = row.dataset.ean;
          tbody.querySelectorAll('tr').forEach(r => r.classList.remove('sel'));
          row.classList.add('sel');
          const p = all.find(x => x.ean === selEan);
          const ins = document.getElementById('inspector');
          ins.style.display = 'block';
          document.getElementById('json-out').textContent = JSON.stringify(p, null, 2);
        });
      });
    }

    async function load() {
      try {
        const r = await fetch('./products.json');
        if (!r.ok) throw 0;
        const d = await r.json();
        all = d.data;
      } catch {
        all = FALLBACK;
      }
      stats(); pills(); render();
    }

    document.getElementById('q').addEventListener('input', () => { page = 1; render(); });
    document.getElementById('sz').addEventListener('change', e => { perPage = +e.target.value; page = 1; render(); });
    document.getElementById('prev').addEventListener('click', () => { if (page > 1) { page--; render(); } });
    document.getElementById('next').addEventListener('click', () => {
      const pages = Math.ceil(filtered().length / perPage);
      if (page < pages) { page++; render(); }
    });

    load();
  </script>
</body>
</html>
